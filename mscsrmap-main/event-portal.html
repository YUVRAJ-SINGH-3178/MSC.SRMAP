<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MSC SRMAP Event Portal - Coming Soon" />
  <title>Event Portal - Microsoft Student Community</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />

  <link rel="stylesheet" href="styles.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    /* ====== EVENT PORTAL — PREMIUM COMING SOON ====== */
    .ep-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .ep-wrap {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 2rem;
    }

    .ep-back {
      position: fixed;
      top: 1.8rem;
      left: 2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: var(--font-m);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--w40);
      text-decoration: none;
      transition: color 0.25s ease;
      z-index: 10;
    }

    .ep-back:hover {
      color: var(--w100);
    }

    .ep-card {
      background: rgba(10, 10, 15, 0.55);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 4px 40px rgba(0, 0, 0, 0.5);
      border-radius: 2px;
      padding: 3.5rem 3rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .ep-eyebrow {
      font-family: var(--font-m);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    .ep-eyebrow::before,
    .ep-eyebrow::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(0, 120, 212, 0.3);
      max-width: 60px;
    }

    .ep-heading {
      font-family: var(--font-d);
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--w100);
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
    }

    .ep-sub {
      font-size: 0.9rem;
      color: var(--w40);
      line-height: 1.7;
      max-width: 380px;
      margin: 0 auto 2.5rem;
    }

    .ep-divider {
      width: 40px;
      height: 1px;
      background: var(--blue);
      margin: 0 auto 2.5rem;
      opacity: 0.4;
    }

    .ep-notify-form {
      display: flex;
      gap: 0.5rem;
    }

    .ep-notify-form input[type="email"] {
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--w100);
      font-family: var(--font-b);
      font-size: 0.9rem;
      padding: 0.8rem 1rem;
      border-radius: 2px;
      outline: none;
      transition: border-color 0.25s ease, background 0.25s ease;
    }

    .ep-notify-form input[type="email"]::placeholder {
      color: var(--w40);
    }

    .ep-notify-form input[type="email"]:focus {
      border-color: rgba(0, 120, 212, 0.5);
      background: rgba(0, 120, 212, 0.04);
    }

    .ep-notify-btn {
      background: var(--blue);
      color: #fff;
      border: none;
      padding: 0.8rem 1.4rem;
      font-family: var(--font-m);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.25s var(--ease);
      white-space: nowrap;
    }

    .ep-notify-btn:hover {
      background: rgba(0, 120, 212, 0.8);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 120, 212, 0.35);
    }

    .ep-status {
      font-family: var(--font-m);
      font-size: 0.75rem;
      margin-top: 0.8rem;
      min-height: 1.2em;
      color: var(--w40);
      text-align: center;
      transition: color 0.3s ease;
    }

    .ep-status.success {
      color: #22c55e;
    }

    .ep-status.error {
      color: #ef4444;
    }

    .ep-social-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      margin-top: 2.5rem;
    }

    .ep-social-row a {
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--w40);
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.25s ease;
    }

    .ep-social-row a:hover {
      color: var(--w100);
      border-color: rgba(0, 120, 212, 0.5);
      background: rgba(0, 120, 212, 0.06);
    }

    @media (max-width: 600px) {
      .ep-card {
        padding: 2.5rem 1.5rem;
      }

      .ep-heading {
        font-size: 2rem;
      }

      .ep-notify-form {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="c-dot" id="cDot"></div>
  <div class="c-ring" id="cRing"></div>

  <!-- Background Video -->
  <video class="background-video" muted loop playsinline id="bgVideo" preload="metadata">
    <source
      src="https://lkbwunzswqbnoygxtilm.supabase.co/storage/v1/object/public/webpage/Microsoft_Student_Community_Title_Card.mp4"
      type="video/mp4" />
  </video>
  <div class="background-overlay"></div>

  <!-- Particle Canvas -->
  <canvas class="ep-canvas" id="canvas-particles"></canvas>

  <!-- Back Link -->
  <a href="index.html" class="ep-back">
    <i class="fa-solid fa-arrow-left"></i>
    Back to home
  </a>

  <!-- Main Content -->
  <div class="ep-wrap">
    <div class="ep-card">
      <div class="ep-eyebrow">Event Portal</div>

      <h1 class="ep-heading">Coming<br />Soon</h1>
      <div class="ep-divider"></div>

      <p class="ep-sub">
        The MSC Event Portal is under construction. Get notified when it goes live — we'll drop your invite as soon as
        we're ready.
      </p>

      <form class="ep-notify-form" id="ep-notify-form" action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="b3f684a3-2f63-4d19-bb5c-60fe3d278ec2" />
        <input type="hidden" name="subject" value="MSC Event Portal — Notification Signup" />
        <input type="email" name="email" placeholder="your@email.com" required />
        <button type="submit" class="ep-notify-btn">Notify me</button>
      </form>
      <div class="ep-status" id="ep-status"></div>

      <div class="ep-social-row">
        <a href="https://discord.com/invite/wZ55nBhWtJ/" target="_blank" rel="noopener" title="Discord">
          <i class="fab fa-discord"></i>
        </a>
        <a href="https://linkedin.com/company/microsoft-student-community-srm-university/" target="_blank"
          rel="noopener" title="LinkedIn">
          <i class="fab fa-linkedin"></i>
        </a>
        <a href="https://www.instagram.com/msc.srmap/" target="_blank" rel="noopener" title="Instagram">
          <i class="fab fa-instagram"></i>
        </a>
        <a href="mailto:msc.community@srmap.edu.in" title="Email">
          <i class="fa fa-envelope"></i>
        </a>
      </div>
    </div>
  </div>

  <script src="particles.js"></script>
  <script src="script.min.js"></script>
  <script>
    // Init particles
    if (typeof window.initParticleBackground === 'function') {
      window.initParticleBackground('canvas-particles', 'rgba(0, 120, 212, alpha)');
    }

    // Video autoplay
    window.addEventListener('load', () => {
      const v = document.getElementById('bgVideo');
      if (v) { v.muted = true; v.playsInline = true; v.play().catch(() => { }); }
    });

    // Form submission
    const form = document.getElementById('ep-notify-form');
    const status = document.getElementById('ep-status');
    if (form && status) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = form.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.textContent = '...';
        try {
          const res = await fetch('https://api.web3forms.com/submit', {
            method: 'POST',
            body: new FormData(form),
          });
          const json = await res.json();
          if (json.success) {
            status.textContent = "You're on the list — we'll be in touch.";
            status.className = 'ep-status success';
            form.reset();
          } else {
            throw new Error();
          }
        } catch {
          status.textContent = "Something went wrong. Try again or join our Discord.";
          status.className = 'ep-status error';
        } finally {
          btn.disabled = false;
          btn.textContent = 'Notify me';
        }
      });
    }
  </script>
</body>

</html>
